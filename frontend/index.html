<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recall</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #080808; }

    #app {
      background: #080808;
      color: #f0ede8;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      padding: 20px 22px 28px;
    }

    /* ---- bloom ---- */
    .bloom { animation: bloom .42s cubic-bezier(.2,.7,.25,1) both; }
    @keyframes bloom {
      from { opacity: 0; transform: scale(.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ---- neighbour node hover / focus ---- */
    .nb-group:hover rect     { stroke-opacity: 1 !important; }
    .nb-group:focus-visible  { outline: none; }
    .nb-group:focus-visible rect { stroke: #c0392b !important; stroke-opacity: 1 !important; }


    /* ---- misc ---- */
    /* Override WebKit UA "ButtonText" which makes buttons black on black backgrounds */
    button { color: inherit; -webkit-appearance: none; appearance: none; }
    input::placeholder { color: #666; opacity: .9; }
    /* Dark-theme native selects — option bg must be opaque or browser ignores it */
    select { background: #141414; color: #f0ede8; border-color: rgba(255,255,255,0.12); }
    option { background: #141414; color: #f0ede8; }
    button:focus-visible { outline: 2px solid #c0392b; outline-offset: 2px; border-radius: 8px; }
    .result-btn:hover { background: rgba(255,255,255,0.07) !important; }
    @media (prefers-reduced-motion: reduce) { .bloom { animation: none; } }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
</head>
<body>
<div id="app">

  <!-- ---- overlay (editor + link picker modals) ---- -->
  <div id="overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:100;align-items:center;justify-content:center;padding:20px;"></div>

  <!-- ---- summon bar (always in DOM so input never loses focus) ---- -->
  <header style="display:flex;align-items:center;gap:18px;">
    <button id="home-btn" aria-label="Home — return to empty screen"
      style="font-family:ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace;font-size:14px;letter-spacing:0.12em;color:#f0ede8;text-transform:lowercase;flex-shrink:0;background:transparent;border:none;cursor:pointer;padding:0;">
      <span style="color:#c0392b;">✦</span> Recall
    </button>
    <button id="new-node-btn" aria-label="Create new node"
      style="font-family:ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace;font-size:12px;background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.35);border-radius:7px;padding:6px 12px;color:#c0392b;cursor:pointer;flex-shrink:0;white-space:nowrap;">
      + New
    </button>
    <button id="overview-btn" aria-label="Overview — show all nodes as a graph"
      style="font-family:ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace;font-size:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:7px;padding:6px 12px;color:#aaa;cursor:pointer;flex-shrink:0;white-space:nowrap;">
      Overview
    </button>
    <div style="position:relative;flex:1;display:flex;align-items:center;gap:10px;background:linear-gradient(145deg,rgba(255,255,255,0.08),rgba(255,255,255,0.03));backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);border:1px solid rgba(255,255,255,0.13);box-shadow:inset 0 1px 0 rgba(255,255,255,0.10),0 4px 24px rgba(0,0,0,0.5);border-radius:10px;padding:10px 12px;">
      <!-- search icon -->
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search-input"
        placeholder="summon a thing…  try a name, a type, or a detail like &quot;create&quot; or &quot;fabric&quot;"
        autocomplete="off" spellcheck="false"
        aria-label="Summon search"
        style="flex:1;background:transparent;border:none;outline:none;color:#f0ede8;font-family:ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace;font-size:14px;"
      />
      <!-- enter hint -->
      <kbd id="enter-hint" style="display:none;align-items:center;color:#666;border:1px solid rgba(255,255,255,0.12);border-radius:5px;padding:2px 5px;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/>
        </svg>
      </kbd>
      <!-- dropdown results -->
      <ul id="search-results" style="display:none;position:absolute;top:calc(100% + 8px);left:0;right:0;background:linear-gradient(160deg,rgba(30,20,20,0.96),rgba(15,12,12,0.98));backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);border:1px solid rgba(255,255,255,0.13);box-shadow:inset 0 1px 0 rgba(255,255,255,0.07),0 18px 48px rgba(0,0,0,0.7);border-radius:10px;list-style:none;margin:0;padding:6px;z-index:20;"></ul>
    </div>
  </header>

  <!-- ---- trail ---- -->
  <nav id="trail" style="display:none;margin-top:14px;align-items:center;flex-wrap:wrap;gap:2px;font-size:12.5px;color:#f0ede8;" aria-label="Path"></nav>

  <!-- ---- stage ---- -->
  <main id="stage" style="margin-top:10px;"></main>

</div>
<script>
// ============================================================
//  Config
// ============================================================
const API_BASE = "http://localhost:8000";

// ============================================================
//  Constants (mirror the prototype palette + layout exactly)
// ============================================================
const C = {
  ink:    "#080808",
  ink2:   "#111",
  paper:  "#f0ede8",
  muted:  "#aaa",
  sep:    "#3a3a3a",    // trail separators / dividers — visible on black
  red:    "#c0392b",    // primary accent
  amber:  "#c49a3c",    // warm secondary — property keys, highlights
  blue:   "#4f86b0",    // cool tertiary — type badges, info
  rose:   "#b87fa0",    // made_of edges
  slate:  "#6a8fa8",    // lives_in edges
};

// Glass panel — gradient + border does the heavy lifting for WebKit fallback.
// backdrop-filter kicks in on supporting engines for the frosted blur effect.
const glass = `
  background: linear-gradient(145deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 100%);
  backdrop-filter: blur(18px) saturate(160%);
  -webkit-backdrop-filter: blur(18px) saturate(160%);
  border: 1px solid rgba(255,255,255,0.13);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.10), 0 4px 24px rgba(0,0,0,0.5);
`.replace(/\n\s*/g, "");

const EDGE_COLOR = C.red;

const VB = { w: 880, h: 560, cx: 440, cy: 285, r: 200 };

const mono = 'ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace';
const sans = 'system-ui,-apple-system,"Segoe UI",Roboto,sans-serif';

// ============================================================
//  State
// ============================================================
let focusNode    = null;   // full object from GET /nodes/{id}
let trail        = [];     // [{id, name}]
let searchResults = [];    // from GET /search
let searchOpen   = false;
let lastFocusId  = null;   // to gate the bloom animation

// editor state
let editorNode  = null;    // null=closed | {mode:'create'} | {mode:'edit', node}
let editorProps = [];      // [{key, value}] — live rows in the property table

// link picker state
let linkPicker  = null;    // null=closed | {target:null|node, q:'', results:[], label:''}

// pan/zoom state
let pzScale = 1, pzTx = 0, pzTy = 0;
let pzDragging = false, pzStartX = 0, pzStartY = 0, pzStartTx = 0, pzStartTy = 0;
let pzDragRect = null;

// overview state
let overviewActive = false;
let overviewTypeFilter = "";

// cluster depth: number of rings shown (1 = direct neighbours only). Default 2.
let clusterDepth = 2;


// ============================================================
//  Utilities
// ============================================================
function esc(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function trunc(s, n) { return s.length > n ? s.slice(0, n - 1) + "…" : s; }

function wrapName(s, limit = 18) {
  s = String(s ?? "");
  if (s.length <= limit) return [s];
  // Only ever break at a space — never split mid-word.
  const cut = s.lastIndexOf(" ", limit);
  if (cut > 0) return [s.slice(0, cut), s.slice(cut + 1)];
  // Single word longer than the line: let it overflow rather than cutting it.
  return [s];
}

// ---- text measurement (for content-sized node boxes) ----
const _measureCtx = document.createElement("canvas").getContext("2d");
function textWidth(text, fontPx, family) {
  _measureCtx.font = `${fontPx}px ${family}`;
  return _measureCtx.measureText(String(text ?? "")).width;
}

// Box-style presets per ring. Ring 2/3 are smaller + tighter so the outer
// rings read as secondary.
const RING1_BOX = { nameLimit: 20, nameFont: 12.5, typeFont: 10, nameLH: 15, typeLH: 13,
                    padX: 14, padTop: 11, padBottom: 11, gap: 5, minW: 110, maxW: 240 };
const RING2_BOX = { nameLimit: 18, nameFont: 10.5, typeFont: 8.5, nameLH: 12.5, typeLH: 10.5,
                    padX: 11, padTop: 8, padBottom: 8, gap: 4, minW: 78, maxW: 180 };

// Measure a neighbour's rendered box from its wrapped text.
function nodeBox(node, o) {
  const lines = wrapName(node.name, o.nameLimit);
  const nameW = Math.max(...lines.map(l => textWidth(l, o.nameFont, mono)));
  const typeW = textWidth(node.type, o.typeFont, sans);
  let w = Math.max(nameW, typeW) + o.padX * 2;
  w = Math.max(o.minW, Math.min(o.maxW, w));
  const h = o.padTop + lines.length * o.nameLH + o.gap + o.typeLH + o.padBottom;
  return { lines, w, h, o };
}

// Angular slice a box needs at angle θ on a ring of radius r — its real
// tangential footprint (width dominates near the poles, height near the
// sides) plus a constant minimum gap.
function sliceFor(box, theta, r, gap) {
  const projHalf = (box.w / 2) * Math.abs(Math.sin(theta))
                 + (box.h / 2) * Math.abs(Math.cos(theta));
  return (2 * projHalf + gap) / r;
}

function totalSlices(group, startAngle, r, gap) {
  let a = startAngle;
  for (const g of group) a += sliceFor(g.box, a, r, gap);
  return a - startAngle;
}

// Place boxes sequentially from startAngle, each claiming room ∝ its own size.
// Coordinates are relative to the ring centre (added later, once the viewBox
// has been sized) so layout doesn't depend on VB.
function placeSequential(group, startAngle, r, gap) {
  let a = startAngle;
  return group.map(g => {
    const slice = sliceFor(g.box, a, r, gap);
    const center = a + slice / 2;
    a += slice;
    return { ...g, angle: center, rx: r * Math.cos(center), ry: r * Math.sin(center) };
  });
}

// Distribute a group across [startAngle, startAngle+arcLength], centred, sized.
function placeArc(group, startAngle, arcLength, r, gap) {
  if (group.length === 0) return [];
  const total = totalSlices(group, startAngle, r, gap);
  const pad = total < arcLength ? (arcLength - total) / 2 : 0;
  return placeSequential(group, startAngle + pad, r, gap);
}

// Ring 1: parents on the upper semicircle, children on the lower, each half
// distributed by real box size so big boxes never crowd their neighbours.
function layoutRing1(neighbours, r, gap) {
  const withBox = neighbours.map(nb => ({ ...nb, box: nodeBox(nb.node, RING1_BOX) }));
  const ins  = withBox.filter(nb => nb.direction === "in");
  const outs = withBox.filter(nb => nb.direction === "out");
  let placed;
  if (ins.length === 0 || outs.length === 0) {
    const group = ins.length === 0 ? outs : ins;
    placed = placeArc(group, -Math.PI / 2, 2 * Math.PI, r, gap);
  } else {
    placed = [
      ...placeArc(ins,  -Math.PI, Math.PI, r, gap),   // upper semicircle: parents
      ...placeArc(outs,  0,       Math.PI, r, gap),   // lower semicircle: children
    ];
  }
  return placed.map(p => ({ ...p, ring: 1 }));
}

// An outer ring: for each node on the previous ring, fan its not-yet-placed
// neighbours out around that node's angle at the larger radius. Async because
// /nodes/{id} only returns one hop, so deeper rings need a fetch per node.
async function layoutOuterRing(prevRing, placedIds, r, gap) {
  const byParent = [];
  for (const p of prevRing) {
    let detail;
    try { detail = await fetchNode(p.node.id); } catch { continue; }
    const kids = [];
    for (const nb of detail.neighbours || []) {
      if (placedIds.has(nb.node.id)) continue;   // already shown on an inner ring
      placedIds.add(nb.node.id);
      kids.push({ ...nb, box: nodeBox(nb.node, RING2_BOX) });
    }
    if (kids.length) byParent.push({ parent: p, kids });
  }
  const out = [];
  for (const { parent, kids } of byParent) {
    const total  = totalSlices(kids, parent.angle, r, gap);
    const placed = placeSequential(kids, parent.angle - total / 2, r, gap);
    for (const k of placed) out.push({ ...k, parent });
  }
  return out;
}

// Best-effort reason text from client side (API doesn't return match kind)
function inferReason(node, q) {
  const ql = q.trim().toLowerCase();
  if (node.name.toLowerCase().includes(ql)) return null; // name hit — no badge needed
  for (const [k, v] of Object.entries(node.properties || {}))
    if (String(v).toLowerCase().includes(ql)) return `matched  ${k}: ${v}`;
  if (node.type.toLowerCase().includes(ql)) return `type · ${node.type}`;
  return "linked to match"; // neighbour-name hit
}

// ============================================================
//  Pan / zoom
// ============================================================
function setPzTransform(svg) {
  const g = svg.querySelector('#pz-group');
  if (g) g.setAttribute('transform', `translate(${pzTx},${pzTy}) scale(${pzScale})`);
}

function resetPanZoom() {
  pzScale = 1; pzTx = 0; pzTy = 0;
  const svg = document.getElementById('cluster-svg');
  if (svg) setPzTransform(svg);
}

function attachPanZoom(svg) {
  svg.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    const rect = svg.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (VB.w / rect.width);
    const my = (e.clientY - rect.top)  * (VB.h / rect.height);
    const s2 = Math.min(Math.max(pzScale * factor, 0.2), 8);
    pzTx = mx - (mx - pzTx) * s2 / pzScale;
    pzTy = my - (my - pzTy) * s2 / pzScale;
    pzScale = s2;
    setPzTransform(svg);
  }, { passive: false });

  svg.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    pzDragging = true;
    pzDragRect  = svg.getBoundingClientRect();
    pzStartX    = e.clientX;
    pzStartY    = e.clientY;
    pzStartTx   = pzTx;
    pzStartTy   = pzTy;
    svg.style.cursor = 'grabbing';
    e.preventDefault();
  });
}

// Window-level handlers registered once so they don't accumulate across re-renders.
window.addEventListener('mousemove', e => {
  if (!pzDragging || !pzDragRect) return;
  const sx = VB.w / pzDragRect.width;
  const sy = VB.h / pzDragRect.height;
  pzTx = pzStartTx + (e.clientX - pzStartX) * sx;
  pzTy = pzStartTy + (e.clientY - pzStartY) * sy;
  const svg = document.getElementById('cluster-svg');
  if (svg) setPzTransform(svg);
});
window.addEventListener('mouseup', () => {
  if (!pzDragging) return;
  pzDragging = false;
  const svg = document.getElementById('cluster-svg');
  if (svg) svg.style.cursor = '';
});

// ============================================================
//  API
// ============================================================
let debounceTimer = null;

function scheduleSearch(q) {
  clearTimeout(debounceTimer);
  if (!q.trim()) { searchResults = []; renderResults(); return; }
  debounceTimer = setTimeout(async () => {
    try {
      const res  = await fetch(`${API_BASE}/search?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      searchResults = data.results || [];
    } catch { searchResults = []; }
    renderResults();
  }, 120);
}

async function fetchNode(id) {
  const res = await fetch(`${API_BASE}/nodes/${id}`);
  if (!res.ok) throw new Error(`Node ${id} not found`);
  return res.json();
}

// Distinct link labels already in the DB (most-common first) — for the label datalist.
async function fetchLinkLabels() {
  try {
    const res  = await fetch(`${API_BASE}/links/labels`);
    const data = await res.json();
    return data.labels || [];
  } catch { return []; }
}

// Distinct types already in the DB (most-used first) — for the type autocomplete.
async function fetchTypes() {
  try {
    const res  = await fetch(`${API_BASE}/types`);
    const data = await res.json();
    return data.types || [];
  } catch { return []; }
}

// Learned template: property keys nodes of this type commonly have.
async function fetchTypeFields(type) {
  if (!type.trim()) return [];
  try {
    const res  = await fetch(`${API_BASE}/types/${encodeURIComponent(type)}/fields`);
    const data = await res.json();
    return data.fields || [];
  } catch { return []; }
}

async function apiPost(path, body) {
  const res = await fetch(`${API_BASE}${path}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!res.ok) { const t = await res.text(); throw new Error(t); }
  return res.json();
}

async function apiPatch(path, body) {
  const res = await fetch(`${API_BASE}${path}`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!res.ok) { const t = await res.text(); throw new Error(t); }
  return res.json();
}

function saveSession() {
  fetch(`${API_BASE}/session`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ focus_id: focusNode?.id ?? null, trail }),
  }).catch(() => {});
}

async function apiDelete(path) {
  const res = await fetch(`${API_BASE}${path}`, { method: "DELETE" });
  if (!res.ok) { const t = await res.text(); throw new Error(t); }
  return res.json();
}

// ============================================================
//  Actions
// ============================================================
async function summon(id) {
  const node = await fetchNode(id);
  const bloom = lastFocusId !== id;
  focusNode   = node;
  lastFocusId = id;
  overviewActive = false;
  resetPanZoom();

  // If the target is already in the trail, rewind to that position instead of appending.
  const existingIdx = trail.findIndex(t => t.id === id);
  if (existingIdx !== -1) {
    trail = trail.slice(0, existingIdx + 1);
  } else {
    trail.push({ id, name: node.name });
  }

  searchOpen = false;
  document.getElementById("search-input").value = "";
  searchResults = [];

  saveSession();
  renderResults();
  renderTrail();
  renderStage(bloom);
}

async function jumpTo(id, i) {
  // Truncate to clicked position — do NOT re-push (summon() would append).
  trail = trail.slice(0, i + 1);
  const node  = await fetchNode(id);
  focusNode   = node;
  lastFocusId = id;
  overviewActive = false;
  resetPanZoom();
  saveSession();
  renderTrail();
  renderStage(true);
}

// Quick-summon from the empty-state chip: search by name, land on first hit.
async function summonByName(name) {
  try {
    const res  = await fetch(`${API_BASE}/search?q=${encodeURIComponent(name)}`);
    const data = await res.json();
    const hit  = (data.results || []).find(r => r.name === name) || data.results?.[0];
    if (hit) summon(hit.id);
  } catch { /* ignore */ }
}

// ============================================================
//  Editor (create / edit node)
// ============================================================

function openEditor(node = null) {
  // Create from a focused node → offer to link the new node back to it on save.
  editorNode  = node
    ? { mode: "edit", node }
    : { mode: "create", linkTo: focusNode ? { id: focusNode.id, name: focusNode.name } : null };
  editorProps = node
    ? Object.entries(node.properties || {}).map(([key, value]) => ({ key, value }))
    : [];
  renderEditor();
}

// Pre-fill property rows from a type's learned template. Only adds keys not
// already present; never wipes values the user already typed. Create mode only.
async function applyTemplate(type) {
  if (editorNode?.mode !== "create") return;
  const fields = await fetchTypeFields(type);
  if (!fields.length) return;
  if (editorNode?.mode !== "create") return; // re-check after await
  syncEditorProps();
  const have = new Set(editorProps.map(p => p.key.trim()).filter(Boolean));
  for (const key of fields)
    if (!have.has(key)) { editorProps.push({ key, value: "" }); have.add(key); }
  renderEditorProps();
}

function closeOverlay() {
  editorNode = null; editorProps = [];
  linkPicker = null;
  const ov = document.getElementById("overlay");
  ov.style.display = "none";
  ov.innerHTML = "";
}

function renderEditor() {
  const ov = document.getElementById("overlay");
  ov.style.display = "flex";
  const isEdit = editorNode?.mode === "edit";
  const node   = isEdit ? editorNode.node : null;

  ov.innerHTML = `
    <div id="modal" style="${glass}border-radius:14px;padding:24px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <span style="font-family:${mono};font-size:13px;color:${C.red};">${isEdit ? "Edit node" : "New node"}</span>
        <button class="ov-close" style="background:transparent;border:none;cursor:pointer;font-size:22px;line-height:1;color:${C.muted};padding:0 2px;">×</button>
      </div>

      <div style="display:flex;flex-direction:column;gap:14px;">
        <label style="display:flex;flex-direction:column;gap:5px;">
          <span style="font-family:${mono};font-size:10px;color:${C.amber};text-transform:uppercase;letter-spacing:0.07em;">Name</span>
          <input id="ed-name" value="${esc(node?.name ?? "")}" autocomplete="off"
            style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:7px;padding:8px 10px;color:#f0ede8;font-family:${mono};font-size:13px;outline:none;width:100%;">
        </label>
        <label style="display:flex;flex-direction:column;gap:5px;">
          <span style="font-family:${mono};font-size:10px;color:${C.amber};text-transform:uppercase;letter-spacing:0.07em;">Type</span>
          <input id="ed-type" value="${esc(node?.type ?? "")}" list="ed-type-list"
            placeholder="server, drive, procedure…" autocomplete="off"
            style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:7px;padding:8px 10px;color:#f0ede8;font-family:${mono};font-size:13px;outline:none;width:100%;">
          <datalist id="ed-type-list"></datalist>
        </label>
        <div>
          <span style="font-family:${mono};font-size:10px;color:${C.amber};text-transform:uppercase;letter-spacing:0.07em;">Properties</span>
          <div id="ed-props" style="margin-top:8px;display:flex;flex-direction:column;gap:6px;"></div>
          <button id="ed-add-prop"
            style="margin-top:8px;background:transparent;border:1px dashed rgba(255,255,255,0.18);border-radius:6px;padding:5px 12px;color:${C.muted};font-family:${mono};font-size:11px;cursor:pointer;width:100%;">
            + add property
          </button>
        </div>
      </div>

      <div id="ed-linkback"></div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:22px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.08);">
        ${isEdit
          ? `<button id="ed-delete" style="background:transparent;border:1px solid rgba(192,57,43,0.35);border-radius:7px;padding:6px 13px;color:${C.red};font-family:${mono};font-size:11.5px;cursor:pointer;">Delete node</button>`
          : `<span></span>`}
        <div style="display:flex;gap:8px;">
          <button class="ov-close" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.10);border-radius:7px;padding:6px 15px;color:${C.muted};font-family:${mono};font-size:11.5px;cursor:pointer;">Cancel</button>
          <button id="ed-save" style="background:${C.red};border:none;border-radius:7px;padding:6px 18px;color:#fff;font-family:${mono};font-size:11.5px;cursor:pointer;font-weight:600;">Save</button>
        </div>
      </div>
    </div>`;

  renderEditorProps();
  document.getElementById("ed-name").focus();
  document.getElementById("ed-add-prop").onclick = () => {
    syncEditorProps();
    editorProps.push({ key: "", value: "" });
    renderEditorProps();
    const keys = document.querySelectorAll(".ep-key");
    keys[keys.length - 1]?.focus();
  };
  document.getElementById("ed-save").onclick = saveEditor;
  if (isEdit) document.getElementById("ed-delete").onclick = deleteCurrentNode;
  ov.querySelectorAll(".ov-close").forEach(b => b.onclick = closeOverlay);
  ov.onclick = e => { if (e.target === ov) closeOverlay(); };

  // Populate the type autocomplete with types already in the DB (most-used
  // first) so users reuse existing types instead of minting near-duplicates.
  fetchTypes().then(types => {
    const dl = document.getElementById("ed-type-list");
    if (!dl) return; // editor may have closed while the request was in flight
    dl.innerHTML = types.map(t => `<option value="${esc(t.type)}"></option>`).join("");
    // Create mode: default the type to the most-used existing type (GET /types
    // is count-descending). Still fully editable; pull in its learned template.
    const typeInp = document.getElementById("ed-type");
    if (!isEdit && typeInp && !typeInp.value.trim() && types.length) {
      typeInp.value = types[0].type;
      applyTemplate(types[0].type);
    }
  });

  if (!isEdit) {
    // Refresh the learned-template suggestions whenever the type changes.
    const typeInp = document.getElementById("ed-type");
    typeInp.onchange = () => applyTemplate(typeInp.value.trim());
  }
}

function renderEditorProps() {
  const container = document.getElementById("ed-props");
  if (!container) return;
  container.innerHTML = editorProps.map((p, i) => `
    <div style="display:flex;gap:6px;align-items:center;">

      <input class="ep-val" data-pi="${i}" value="${esc(p.value)}" placeholder="value"
        style="flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.10);border-radius:6px;padding:6px 8px;color:#f0ede8;font-family:${mono};font-size:12px;outline:none;">

  container.querySelectorAll(".ep-rm").forEach(btn => btn.onclick = () => {
    syncEditorProps();
    editorProps.splice(+btn.dataset.pi, 1);
    renderEditorProps();

}

// Inline "link the new node back to the focused node?" step, shown at the
// bottom of the create editor after the first Save click. Create mode only.
function renderLinkBackStep() {
  const c = document.getElementById("ed-linkback");
  if (!c || !editorNode?.linkTo) return;
  const yes = editorNode.linkYes;
  const onStyle  = `background:${C.red};border:1px solid ${C.red};color:#fff;`;
  const offStyle = `background:#1c1c1c;border:1px solid #333;color:#888;`;
  const btnBase  = `border-radius:7px;padding:6px 16px;font-family:ui-monospace,monospace;font-size:11.5px;cursor:pointer;`;

  const isChild = editorNode.linkDirection !== "parent";
  const childStyle  = isChild  ? onStyle : offStyle;
  const parentStyle = !isChild ? onStyle : offStyle;
  c.innerHTML = `
    <div style="margin-top:18px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.08);">
      <span style="font-family:${mono};font-size:11.5px;color:${C.muted};">
        Link to <span style="color:${C.paper};">${esc(editorNode.linkTo.name)}</span>?
      </span>
      <div style="display:flex;gap:8px;margin-top:9px;">
        <button id="lb-yes" style="${btnBase}${yes ? onStyle : offStyle}">Yes</button>
        <button id="lb-no"  style="${btnBase}${yes ? offStyle : onStyle}">No</button>
      </div>
      ${yes ? `
        <div style="display:flex;gap:6px;margin-top:10px;align-items:center;">
          <span style="font-family:${mono};font-size:10px;color:${C.muted};">New node is a</span>
          <button id="lb-child"  style="${btnBase}${childStyle}font-size:10.5px;padding:4px 10px;">child of</button>
          <button id="lb-parent" style="${btnBase}${parentStyle}font-size:10.5px;padding:4px 10px;">parent of</button>
          <span style="font-family:${mono};font-size:10px;color:${C.muted};">${esc(editorNode.linkTo.name)}</span>
        </div>
        <label style="display:flex;flex-direction:column;gap:5px;margin-top:12px;">
          <span style="font-family:${mono};font-size:10px;color:${C.amber};text-transform:uppercase;letter-spacing:0.07em;">Label</span>
          <input id="lb-label" value="${esc(editorNode.linkLabel || "")}" placeholder="e.g. runs on, backup of…"
            list="lb-label-list" autocomplete="off"
            style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:7px;padding:8px 10px;color:#f0ede8;font-family:${mono};font-size:13px;outline:none;width:100%;">
          <datalist id="lb-label-list"></datalist>
        </label>` : ``}
    </div>`;

  document.getElementById("lb-yes").onclick = () => { editorNode.linkYes = true;  renderLinkBackStep(); };
  document.getElementById("lb-no").onclick  = () => { editorNode.linkYes = false; renderLinkBackStep(); };
  if (yes) {
    document.getElementById("lb-child")?.addEventListener("click", () => { editorNode.linkDirection = "child"; renderLinkBackStep(); });
    document.getElementById("lb-parent")?.addEventListener("click", () => { editorNode.linkDirection = "parent"; renderLinkBackStep(); });
    const lbl = document.getElementById("lb-label");
    lbl.oninput = e => { editorNode.linkLabel = e.target.value; };
    lbl.focus();
    fetchLinkLabels().then(labels => {
      const dl = document.getElementById("lb-label-list");
      if (!dl) return;
      dl.innerHTML = labels.map(l => `<option value="${esc(l)}"></option>`).join("");
    });
  }
}

function syncEditorProps() {
  document.querySelectorAll(".ep-key").forEach(inp => {
    if (editorProps[+inp.dataset.pi]) editorProps[+inp.dataset.pi].key = inp.value;
  });
  document.querySelectorAll(".ep-val").forEach(inp => {
    if (editorProps[+inp.dataset.pi]) editorProps[+inp.dataset.pi].value = inp.value;
  });
}

async function saveEditor() {
  syncEditorProps();
  const name = document.getElementById("ed-name").value.trim();
  const type = document.getElementById("ed-type").value.trim() || "thing";
  if (!name) {
    document.getElementById("ed-name").style.borderColor = C.red;
    return;
  }
  const properties = {};
  for (const { key, value } of editorProps)
    if (key.trim()) properties[key.trim()] = value;

  // Create-from-focused-node: gate the first Save on the inline link-back step.
  if (editorNode.mode === "create" && editorNode.linkTo && !editorNode.linkAsked) {
    editorNode.linkAsked = true;
    editorNode.linkYes   = true;   // default to linking, since the user created from this node
    editorNode.linkLabel = "";
    renderLinkBackStep();
    return;
  }

  try {
    let node;
    if (editorNode.mode === "create") {
      node = await apiPost("/nodes", { name, type, properties });
      // Link the new node back to the node it was created from, if requested.
      if (editorNode.linkTo && editorNode.linkYes) {
        const label = (editorNode.linkLabel || "").trim() || null;
        const isChild = editorNode.linkDirection !== "parent";
        const src = isChild ? editorNode.linkTo.id : node.id;
        const tgt = isChild ? node.id : editorNode.linkTo.id;
        await apiPost("/links", { source_id: src, target_id: tgt, label });
      }
    } else {
      const existing = editorNode.node.properties || {};
      const propPatch = { ...properties };
      // mark deleted keys as null so the backend removes them
      for (const k of Object.keys(existing))
        if (!(k in properties)) propPatch[k] = null;
      node = await apiPatch(`/nodes/${editorNode.node.id}`, { name, type, properties: propPatch });
    }
    closeOverlay();
    await summon(node.id);
  } catch (e) {
    alert(`Save failed: ${e.message}`);
  }
}

async function deleteCurrentNode() {
  if (editorNode?.mode !== "edit") return;
  const node = editorNode.node;
  // Use focusNode.neighbours.length for the count — it covers all links.
  const linkCount = (focusNode?.neighbours || []).length;
  const plural = linkCount === 1 ? "link" : "links";
  if (!confirm(`Delete "${node.name}" and its ${linkCount} ${plural}?`)) return;
  try {
    await apiDelete(`/nodes/${node.id}`);
    closeOverlay();
    focusNode = null; lastFocusId = null; trail = [];
    renderTrail();
    renderStage(false);
  } catch (e) {
    alert(`Delete failed: ${e.message}`);
  }
}

// ============================================================
//  Render: stage
// ============================================================
async function renderStage(bloom = true) {
  const stage = document.getElementById("stage");

  if (!focusNode) {
    fetch(`${API_BASE}/roots`)
      .then(r => r.json())
      .then(data => {
        stage.innerHTML = buildEmpty(data.roots || []);
        stage.querySelectorAll(".start-chip").forEach(btn =>
          btn.addEventListener("click", () => summon(+btn.dataset.nid))
        );
      })
      .catch(() => {
        stage.innerHTML = buildEmpty([]);
      });
    return;
  }

  const capturedId = focusNode.id;
  const GAP1 = 16, GAP2 = 12;
  const RAD = [0, 215, 370, 520];  // radius per ring index

  // Ring 1 is synchronous; outer rings each need a fetch per inner node.
  const ring1 = layoutRing1(focusNode.neighbours || [], RAD[1], GAP1);
  const placedIds = new Set([focusNode.id, ...ring1.map(p => p.node.id)]);
  const outer = [];
  let prev = ring1;
  for (let ring = 2; ring <= clusterDepth; ring++) {
    const placed = await layoutOuterRing(prev, placedIds, RAD[ring], GAP2);
    if (focusNode.id !== capturedId) return;  // user navigated away mid-fetch
    placed.forEach(p => { p.ring = ring; });
    outer.push(...placed);
    if (placed.length === 0) break;           // nothing further out — stop
    prev = placed;
  }

  // Size the viewBox to the outermost ring actually populated, then resolve
  // each node's absolute position from its centre-relative coords.
  const maxRing = outer.length ? Math.max(...outer.map(p => p.ring)) : 1;
  const half = RAD[maxRing] + 130;
  VB.h = 2 * half;
  VB.w = Math.round(2 * half * 1.3);
  VB.cx = VB.w / 2;
  VB.cy = VB.h / 2;
  VB.r = RAD[1];
  for (const p of [...ring1, ...outer]) { p.x = VB.cx + p.rx; p.y = VB.cy + p.ry; }

  stage.innerHTML = `
    <div style="position:relative;height:calc(100vh - 130px);overflow:hidden;">
      ${buildDepthControl()}
      ${buildSVG(ring1, outer, bloom)}
      ${buildSheet()}
    </div>`;

  // Depth control
  stage.querySelectorAll(".depth-btn").forEach(b =>
    b.addEventListener("click", () => {
      const d = +b.dataset.depth;
      if (d === clusterDepth) return;
      clusterDepth = d;
      renderStage(false);
    })
  );

  // SVG cluster: click/keyboard to navigate
  stage.querySelectorAll(".nb-group").forEach(g => {
    g.addEventListener("click", () => summon(+g.dataset.nid));
    g.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") summon(+g.dataset.nid); });
  });
  // Pan/zoom
  const clusterSvg = stage.querySelector('#cluster-svg');
  if (clusterSvg) attachPanZoom(clusterSvg);
  // Sheet: navigate via neighbour name buttons
  stage.querySelectorAll(".sheet-nb-nav").forEach(b =>
    b.addEventListener("click", () => summon(+b.dataset.nid))
  );
  // Sheet: unlink buttons
  stage.querySelectorAll(".sheet-unlink").forEach(b =>
    b.addEventListener("click", () => deleteLink(+b.dataset.lid))
  );
  // Sheet: flip direction buttons
  stage.querySelectorAll(".sheet-flip").forEach(b =>
    b.addEventListener("click", () => flipLink(+b.dataset.lid))
  );
  // Sheet: label edit — commit on blur or Enter
  stage.querySelectorAll(".sheet-link-label").forEach(inp => {
    const lid = +inp.dataset.lid;
    inp.addEventListener("keydown", e => { if (e.key === "Enter") inp.blur(); });
    inp.addEventListener("blur", () => {
      const nb = (focusNode.neighbours || []).find(n => n.link.id === lid);
      if (nb && inp.value !== (nb.link.label || "")) updateLinkLabel(lid, inp.value);
    });
  });
  // Sheet: edit current node
  stage.querySelectorAll(".sheet-edit-btn").forEach(b =>
    b.addEventListener("click", () => openEditor(focusNode))
  );
  // Sheet: open link picker
  stage.querySelectorAll(".sheet-add-link-btn").forEach(b =>
    b.addEventListener("click", openLinkPicker)
  );
}

// Ring-1 edge: centre → neighbour, with arrowhead and a label offset off the line.
function edge1SVG(p) {
  const dir = p.direction;
  const lbl = p.link.label || "";
  const edgeColor = dir === "in" ? C.slate : C.red;
  const dx = p.x - VB.cx, dy = p.y - VB.cy;
  const len = Math.sqrt(dx*dx + dy*dy) || 1;
  const ux = dx/len, uy = dy/len;
  const mx = (VB.cx + p.x) / 2, my = (VB.cy + p.y) / 2;
  // "out": arrow points center→child; "in": parent→center
  const sign = dir === "out" ? 1 : -1;
  const S = 7;
  const tx = mx + sign*ux*S, ty = my + sign*uy*S;
  const b1x = mx - sign*ux*(S*0.5) + (-uy)*(S*0.5), b1y = my - sign*uy*(S*0.5) + ux*(S*0.5);
  const b2x = mx - sign*ux*(S*0.5) - (-uy)*(S*0.5), b2y = my - sign*uy*(S*0.5) - ux*(S*0.5);
  // Offset the label perpendicular to the line so it never sits on the arrow.
  const off = 11;
  const lx = mx + (-uy) * off, ly = my + ux * off;
  return `
    <g>
      <line x1="${VB.cx}" y1="${VB.cy}" x2="${p.x}" y2="${p.y}"
            stroke="${edgeColor}" stroke-opacity="0.35" stroke-width="1.5"/>
      <polygon points="${tx},${ty} ${b1x},${b1y} ${b2x},${b2y}"
               fill="${edgeColor}" fill-opacity="0.65"/>
      ${lbl ? `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle"
            style="font-family:${mono};font-size:10.5px;letter-spacing:0.02em;" fill="${edgeColor}">${esc(lbl)}</text>` : ""}
    </g>`;
}

// Outer-ring edge: from its inner-ring parent, muted, no label (secondary).
function edge2SVG(p) {
  const a = p.parent;
  const op = p.ring === 2 ? 0.28 : 0.18;
  return `<line x1="${a.x}" y1="${a.y}" x2="${p.x}" y2="${p.y}"
            stroke="#5a5a5a" stroke-opacity="${op}" stroke-width="1"/>`;
}

// A neighbour box. Ring 1 keeps the parent/child colours; outer rings are
// smaller (via their box preset) and muted so they read as secondary.
function nodeGroupSVG(p) {
  const b = p.box, o = b.o, w = b.w, h = b.h;
  const x0 = p.x - w / 2, y0 = p.y - h / 2;
  let stroke, strokeOp, nameFill, typeFill;
  if (p.ring === 1) {
    stroke = p.direction === "in" ? C.slate : C.red;
    strokeOp = 0.55; nameFill = C.paper; typeFill = C.muted;
  } else {
    stroke = "#6a6a6a";
    strokeOp = p.ring === 2 ? 0.40 : 0.28;
    nameFill = p.ring === 2 ? "#b9b4ac" : "#8a857e";
    typeFill = "#6a6560";
  }
  const nameY = y0 + o.padTop + o.nameFont;
  const typeY = y0 + o.padTop + b.lines.length * o.nameLH + o.gap + o.typeFont;
  const nameText = b.lines.map((l, i) =>
    `<tspan x="${p.x}"${i === 0 ? "" : ` dy="${o.nameLH}"`}>${esc(l)}</tspan>`).join("");
  return `
    <g class="nb-group" data-nid="${p.node.id}" tabindex="0" role="button"
       aria-label="Move to ${esc(p.node.name)}" style="cursor:pointer;">
      <title>${esc(p.node.name)}</title>
      <rect x="${x0}" y="${y0}" width="${w}" height="${h}" rx="9"
            fill="rgba(255,255,255,0.04)" stroke="${stroke}" stroke-opacity="${strokeOp}" stroke-width="1.5"/>
      <text x="${p.x}" y="${nameY}" text-anchor="middle"
            style="font-family:${mono};font-size:${o.nameFont}px;" fill="${nameFill}">${nameText}</text>
      <text x="${p.x}" y="${typeY}" text-anchor="middle"
            style="font-family:${sans};font-size:${o.typeFont}px;letter-spacing:0.04em;" fill="${typeFill}">${esc(p.node.type)}</text>
    </g>`;
}

function buildSVG(ring1, outer, bloom) {
  // Outer rings under ring 1; outer boxes under ring-1 boxes.
  const outerEdges = outer.map(edge2SVG).join("");
  const ring1Edges = ring1.map(edge1SVG).join("");
  const outerNodes = outer.map(nodeGroupSVG).join("");
  const ring1Nodes = ring1.map(nodeGroupSVG).join("");

  const CN_W       = 220;
  const CN_RX      = 12;
  const CN_PAD_V   = 14;
  const CN_NAME_LH = 17;
  const CN_TYPE_LH = 14;
  const CN_GAP     = 8;

  const cnNameLines = wrapName(focusNode.name, 22);
  const cnTypeLines = wrapName(focusNode.type, 14);

  const cnBoxH = CN_PAD_V + cnNameLines.length * CN_NAME_LH + CN_GAP
               + cnTypeLines.length * CN_TYPE_LH + CN_PAD_V;
  const cnBoxX = VB.cx - CN_W / 2;
  const cnBoxY = VB.cy - cnBoxH / 2;
  const cnNameY = cnBoxY + CN_PAD_V + CN_NAME_LH;
  const cnTypeY = cnBoxY + CN_PAD_V + cnNameLines.length * CN_NAME_LH + CN_GAP + CN_TYPE_LH;

  const cnNameText = cnNameLines.map((line, i) =>
    `<tspan x="${VB.cx}"${i === 0 ? "" : ` dy="${CN_NAME_LH}"`}>${esc(line)}</tspan>`
  ).join("");
  const cnTypeText = cnTypeLines.map((line, i) =>
    `<tspan x="${VB.cx}"${i === 0 ? "" : ` dy="${CN_TYPE_LH}"`}>${esc(line)}</tspan>`
  ).join("");

  return `
    <svg id="cluster-svg" viewBox="0 0 ${VB.w} ${VB.h}"
         style="position:absolute;inset:0;width:100%;height:100%;display:block;"
         role="img" aria-label="Cluster around ${esc(focusNode.name)}">
      <defs>
        <radialGradient id="halo" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="${C.red}" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="${C.red}" stop-opacity="0"/>
        </radialGradient>

      </defs>
      <g id="pz-group">
        <g class="${bloom ? "bloom" : ""}" style="transform-origin:${VB.cx}px ${VB.cy}px;">
          ${outerEdges}
          ${ring1Edges}
          <circle cx="${VB.cx}" cy="${VB.cy}" r="118" fill="url(#halo)"/>
          <g>
            <title>${esc(focusNode.name)}</title>
            <rect x="${cnBoxX}" y="${cnBoxY}" width="${CN_W}" height="${cnBoxH}" rx="${CN_RX}"
                  fill="rgba(12,12,12,0.92)" stroke="${C.red}" stroke-width="2.5"/>
            <text x="${VB.cx}" y="${cnNameY}" text-anchor="middle"
                  style="font-family:${mono};font-size:15px;font-weight:600;" fill="${C.paper}">
              ${cnNameText}
            </text>
            <text x="${VB.cx}" y="${cnTypeY}" text-anchor="middle"
                  style="font-family:${mono};font-size:10.5px;letter-spacing:0.08em;" fill="${C.blue}">
              ${cnTypeText}
            </text>
          </g>
          ${outerNodes}
          ${ring1Nodes}
        </g>
      </g>
    </svg>`;
}

async function renderOverview() {
  overviewActive = true;
  const stage = document.getElementById('stage');
  stage.innerHTML = `
    <div id="overview-panel">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:12px;flex-wrap:wrap;">
        <span style="font-family:${mono};font-size:11px;color:${C.muted};text-transform:uppercase;letter-spacing:0.08em;">Overview</span>
        <select id="ov-filter"
          style="background:#141414;border:1px solid rgba(255,255,255,0.18);border-radius:6px;
                 padding:4px 8px;color:#f0ede8;font-family:${mono};font-size:11px;outline:none;cursor:pointer;">
          <option value="" style="background:#141414;color:#f0ede8;">all types</option>
        </select>
        <span id="ov-count" style="font-family:${mono};font-size:11px;color:${C.muted};"></span>
      </div>
      <svg id="ov-svg" style="width:100%;display:block;background:rgba(255,255,255,0.02);border-radius:12px;
                              border:1px solid rgba(255,255,255,0.06);" height="620"></svg>
    </div>`;

  fetchTypes().then(types => {
    const sel = document.getElementById('ov-filter');
    if (!sel) return;
    types.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t.type;
      opt.textContent = `${t.type} (${t.count})`;
      opt.style.background = '#141414';
      opt.style.color = '#f0ede8';
      if (t.type === overviewTypeFilter) opt.selected = true;
      sel.appendChild(opt);
    });
    sel.onchange = () => { overviewTypeFilter = sel.value; drawOverviewGraph(); };
  });

  await drawOverviewGraph();
}

async function drawOverviewGraph() {
  const svgEl = document.getElementById('ov-svg');
  if (!svgEl) return;

  let data;
  try { data = await fetch(`${API_BASE}/graph`).then(r => r.json()); }
  catch { return; }

  let nodes = data.nodes.map(n => ({ ...n }));
  let links = data.links.map(l => ({ ...l }));

  if (overviewTypeFilter) {
    const keep = new Set(nodes.filter(n => n.type === overviewTypeFilter).map(n => n.id));
    nodes = nodes.filter(n => keep.has(n.id));
    links = links.filter(l => keep.has(l.source_id) && keep.has(l.target_id));
  }

  const countEl = document.getElementById('ov-count');
  if (countEl) countEl.textContent = `${nodes.length} nodes · ${links.length} links`;

  svgEl.innerHTML = '';
  if (nodes.length === 0) return;

  const W = svgEl.getBoundingClientRect().width || 900;
  const H = 620;
  svgEl.setAttribute('viewBox', `0 0 ${W} ${H}`);

  // ── type cluster positions ────────────────────────────────────────────────
  // Each distinct type gets a fixed anchor on a circle; nodes are pulled toward
  // their type's anchor so same-type nodes clump together naturally.
  const typeList = [...new Set(nodes.map(n => n.type))];
  const clusterR  = Math.min(W, H) * (typeList.length > 1 ? 0.28 : 0);
  const typeAnchor = {};
  typeList.forEach((t, i) => {
    const a = -Math.PI / 2 + (i * 2 * Math.PI) / typeList.length;
    typeAnchor[t] = { x: W / 2 + clusterR * Math.cos(a), y: H / 2 + clusterR * Math.sin(a) };
  });

  const nodeById = new Map(nodes.map(n => [n.id, n]));
  const simLinks = links
    .filter(l => nodeById.has(l.source_id) && nodeById.has(l.target_id))
    .map(l => ({ source: l.source_id, target: l.target_id }));

  const maxLc = Math.max(...nodes.map(n => n.link_count), 1);
  const rScale = d3.scaleSqrt().domain([0, maxLc]).range([5, 18]);

  const clusterStrength = typeList.length > 1 ? 0.14 : 0;
  const sim = d3.forceSimulation(nodes)
    .force('link',     d3.forceLink(simLinks).id(d => d.id).distance(55).strength(0.65))
    .force('charge',   d3.forceManyBody().strength(-70))
    .force('center',   d3.forceCenter(W / 2, H / 2).strength(0.04))
    .force('collide',  d3.forceCollide(d => rScale(d.link_count) + 12))
    .force('clusterX', d3.forceX(d => typeAnchor[d.type].x).strength(clusterStrength))
    .force('clusterY', d3.forceY(d => typeAnchor[d.type].y).strength(clusterStrength));

  // ── D3 zoom / pan ─────────────────────────────────────────────────────────
  const svg = d3.select(svgEl);
  const container = svg.append('g').attr('class', 'ov-container');

  const zoom = d3.zoom()
    .scaleExtent([0.05, 10])
    .on('zoom', e => container.attr('transform', e.transform));
  svg.call(zoom)
     .on('dblclick.zoom', null); // disable double-click zoom (we use it for summon)

  const linkG  = container.append('g');
  const nodeG  = container.append('g');
  const labelG = container.append('g');

  const linkEls = linkG.selectAll('line').data(simLinks).join('line')
    .attr('stroke', '#2a2a2a').attr('stroke-width', 1).attr('stroke-opacity', 0.9);

  const nodeEls = nodeG.selectAll('circle').data(nodes).join('circle')
    .attr('r', d => rScale(d.link_count))
    .attr('fill', 'rgba(10,10,10,0.95)')
    .attr('stroke', '#3a3a3a').attr('stroke-width', 1.5)
    .style('cursor', 'pointer')
    .on('mouseover', function() { d3.select(this).attr('stroke', C.red).attr('stroke-width', 2.5); })
    .on('mouseout',  function() { d3.select(this).attr('stroke', '#3a3a3a').attr('stroke-width', 1.5); })
    .on('click', (e, d) => { e.stopPropagation(); overviewActive = false; summon(d.id); });

  const labelEls = labelG.selectAll('text').data(nodes).join('text')
    .text(d => trunc(d.name, 20))
    .attr('text-anchor', 'middle').attr('dy', '0.35em')
    .style('font-family', mono).style('font-size', '9px')
    .style('fill', '#666').style('pointer-events', 'none').style('user-select', 'none');

  sim.on('tick', () => {
    linkEls.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
           .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodeEls.attr('cx', d => d.x).attr('cy', d => d.y);
    labelEls.attr('x', d => d.x).attr('y', d => d.y);
  });

  // After the simulation settles, fit the view to show all nodes
  sim.on('end', () => {
    const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y);
    const pad = 40;
    const x0 = Math.min(...xs) - pad, y0 = Math.min(...ys) - pad;
    const x1 = Math.max(...xs) + pad, y1 = Math.max(...ys) + pad;
    svg.transition().duration(400).call(
      zoom.transform,
      d3.zoomIdentity
        .translate(W / 2, H / 2)
        .scale(Math.min(8, 0.9 / Math.max((x1 - x0) / W, (y1 - y0) / H)))
        .translate(-(x0 + x1) / 2, -(y0 + y1) / 2)
    );
  });
}

  document.getElementById("overview-btn").addEventListener("click", () => {
    if (overviewActive) {
      overviewActive = false;
      renderStage(false);
    } else {
      renderOverview();
    }
  });

  // ---- home button ----
  document.getElementById("home-btn").addEventListener("click", () => {
    focusNode      = null;
    lastFocusId    = null;
    trail          = [];
    searchOpen     = false;
    searchResults  = [];
    overviewActive = false;
    document.getElementById("search-input").value = "";
    saveSession();
    renderResults();
    renderTrail();
    renderStage(false);
  });

  const inp = document.getElementById("search-input");

  inp.addEventListener("input", e => {
    searchOpen = true;
    scheduleSearch(e.target.value);
  });

  inp.addEventListener("focus", () => {
    searchOpen = true;
    if (inp.value) renderResults();
  });

  inp.addEventListener("keydown", e => {
    if (e.key === "Enter" && searchResults.length > 0) {
      summon(searchResults[0].id);
    } else if (e.key === "Escape") {
      searchOpen = false;
      renderResults();
    }
  });

  // Close dropdown on outside click
  document.addEventListener("click", e => {
    if (!e.target.closest("#app header")) {
      searchOpen = false;
      renderResults();
    }
  });

  // Restore last session, fall back to home screen on any error or missing node.
  (async () => {
    try {
      const res  = await fetch(`${API_BASE}/session`);
      const data = await res.json();
      if (data.focus_id) {
        const node = await fetchNode(data.focus_id);
        focusNode   = node;
        lastFocusId = node.id;
        trail       = Array.isArray(data.trail) && data.trail.length > 0
                        ? data.trail
                        : [{ id: node.id, name: node.name }];
        renderTrail();
        renderStage(false);
        return;
      }
    } catch { /* fall through */ }
    renderStage(false);
  })();
})();
</script>
</body>
</html>
